name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 سحب كود المشروع
        uses: actions/checkout@v4

      - name: ☕ تجهيز بيئة جافا
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 تجهيز بيئة فلاتر
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🔐 حقن مفاتيح الأمان
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      # التعديل هنا: استخدام upgrade بدلاً من get لتحديث ملف الـ lock
      - name: 📦 تحديث الحزم إجبارياً
        run: flutter pub upgrade --major-versions

      - name: 🛠️ بناء تطبيق الأندرويد (APK)
        run: flutter build apk --release

      - name: 📤 تصدير التطبيق الجاهز للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: Damascus-Institute-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
